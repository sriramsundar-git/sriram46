<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitchen Display</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <style>
    /* ── Variables ─────────────────────────────────────────────── */
    :root {
      --bg:       #0f1117;
      --surface:  #181c25;
      --surface2: #1e2330;
      --border:   #252b3b;
      --accent:   #e8a045;
      --accent2:  #4d9eff;
      --green:    #3ecf8e;
      --red:      #f46b6b;
      --text:     #e8ecf4;
      --muted:    #6b7591;
      --dim:      #3a4155;
      --font:     'DM Sans', sans-serif;
      --mono:     'DM Mono', monospace;
      --serif:    'Playfair Display', serif;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

    /* Scanline effect */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* ── Header ────────────────────────────────────────────────── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; height: 60px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 32px; height: 32px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 18px; height: 18px; fill: #000; }
    .brand-name { font-family: var(--serif); font-size: 1.15rem; color: var(--text); }
    .brand-sub  { font-size: .68rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: -1px; }

    .header-right { display: flex; align-items: center; gap: 1.2rem; }
    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .68rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--green); padding: 3px 10px;
      background: rgba(62,207,142,.08); border: 1px solid rgba(62,207,142,.25); border-radius: 12px;
    }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: ld 1.4s ease-in-out infinite; }
    @keyframes ld { 0%,100%{opacity:1} 50%{opacity:.15} }

    .hclock { font-family: var(--mono); font-size: 1rem; color: var(--accent); letter-spacing: 2px; }
    .hpill  {
      font-size: .7rem; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); padding: 3px 12px;
      border: 1px solid var(--border); border-radius: 20px;
    }
    .hpill b { color: var(--text); font-weight: 500; margin-left: 3px; }

    /* ── Body ──────────────────────────────────────────────────── */
    .body { padding: 1.3rem 1.5rem 3rem; }

    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-label {
      font-size: .68rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); display: flex; align-items: center; gap: 8px;
    }
    .section-label::before {
      content: ''; width: 3px; height: 12px;
      background: var(--accent); border-radius: 2px; display: inline-block;
    }
    .section-count {
      font-family: var(--mono); font-size: .68rem; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 2px 10px; border-radius: 10px;
    }

    /* ── Grid ──────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; display: flex; flex-direction: column;
      overflow: hidden; transition: box-shadow .2s, opacity .4s, transform .4s;
      animation: ci .3s ease both;
    }
    @keyframes ci { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .card.urgent { border-color: rgba(244,107,107,.35); }
    .card.ready-state { border-color: rgba(62,207,142,.3); }

    .card-stripe { height: 3px; background: var(--accent); }
    .card.urgent    .card-stripe { background: var(--red); }
    .card.ready-state .card-stripe { background: var(--green); }

    /* Card Head */
    .card-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: .9rem 1rem .75rem;
    }
    .token-num   { font-family: var(--serif); font-size: 2.1rem; line-height: 1; color: var(--accent); }
    .card.urgent .token-num { color: var(--red); }
    .token-label { font-size: .63rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

    .card-meta   { text-align: right; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
    .order-ref   { font-family: var(--mono); font-size: .66rem; color: var(--dim); }
    .order-time-val { font-family: var(--mono); font-size: .78rem; color: var(--muted); }

    .timer-chip {
      font-family: var(--mono); font-size: .7rem; letter-spacing: 1px;
      padding: 3px 9px; border-radius: 6px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .timer-chip .ti { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .timer-chip.normal { background: rgba(77,158,255,.08); border: 1px solid rgba(77,158,255,.2);  color: var(--accent2); }
    .timer-chip.warn   { background: rgba(232,160,69,.1);  border: 1px solid rgba(232,160,69,.3); color: var(--accent); }
    .timer-chip.urgent { background: rgba(244,107,107,.1); border: 1px solid rgba(244,107,107,.35); color: var(--red); animation: ub .9s step-end infinite; }
    @keyframes ub { 0%,100%{opacity:1} 50%{opacity:.35} }

    .divider { height: 1px; background: var(--border); margin: 0 1rem; }

    /* Items */
    .items-list { padding: .7rem 1rem; flex: 1; display: flex; flex-direction: column; gap: .3rem; }
    .item-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      border: 1px solid transparent; transition: background .15s, border-color .15s;
    }
    .item-row:hover  { background: var(--surface2); border-color: var(--border); }
    .item-row.ticked { opacity: .5; }
    .item-row.ticked .item-label { text-decoration: line-through; }

    .tick-box {
      width: 16px; height: 16px; border: 1.5px solid var(--dim);
      border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .item-row.ticked .tick-box { border-color: var(--green); background: rgba(62,207,142,.15); }
    .tick-mark {
      width: 8px; height: 5px;
      border-left: 1.5px solid var(--green); border-bottom: 1.5px solid var(--green);
      transform: rotate(-45deg) translate(1px,-1px); display: none;
    }
    .item-row.ticked .tick-mark { display: block; }

    .item-qty   { font-family: var(--mono); font-size: .82rem; font-weight: 500; color: var(--accent); min-width: 22px; flex-shrink: 0; }
    .item-label { font-size: .85rem; color: var(--text); flex: 1; font-weight: 400; }

    /* Progress */
    .progress-wrap { padding: 0 1rem .65rem; }
    .progress-info { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .progress-text { font-size: .63rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .progress-pct  { font-family: var(--mono); font-size: .63rem; color: var(--muted); }
    .progress-bar  { height: 2px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .4s ease; width: 0%; }

    /* Status chip */
    .status-row { display: flex; justify-content: center; padding: .35rem 1rem .6rem; }
    .status-chip {
      font-size: .63rem; letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 14px; border-radius: 12px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .status-chip.preparing {
      background: rgba(232,160,69,.08); border: 1px solid rgba(232,160,69,.2); color: var(--accent);
    }
    .status-chip.preparing .sdot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: ld 1s infinite;
    }
    .status-chip.ready {
      background: rgba(62,207,142,.08); border: 1px solid rgba(62,207,142,.25); color: var(--green);
    }

    /* Footer buttons */
    .card-foot {
      display: flex; gap: .5rem;
      padding: .7rem 1rem; border-top: 1px solid var(--border);
    }
    .btn {
      font-family: var(--font); font-size: .73rem; font-weight: 600;
      letter-spacing: .8px; text-transform: uppercase;
      padding: 9px 0; border-radius: 7px; border: none;
      cursor: pointer; flex: 1; transition: all .18s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: default; }

    /* Mark as Ready — green */
    .btn-ready {
      background: rgba(62,207,142,.08);
      border: 1px solid rgba(62,207,142,.3);
      color: var(--green);
    }
    .btn-ready:hover:not(:disabled) {
      background: var(--green); color: #0f1117;
      box-shadow: 0 4px 16px rgba(62,207,142,.25);
    }

    /* Served — blue */
    .btn-served {
      background: rgba(77,158,255,.07);
      border: 1px solid rgba(77,158,255,.25);
      color: var(--accent2);
    }
    .btn-served:hover:not(:disabled) {
      background: var(--accent2); color: #0f1117;
      box-shadow: 0 4px 16px rgba(77,158,255,.2);
    }

    /* ── Empty state ───────────────────────────────────────────── */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 5rem 2rem; color: var(--dim);
    }
    .empty-state svg { width: 48px; height: 48px; fill: var(--dim); margin-bottom: 1rem; opacity: .4; }
    .empty-state p { font-family: var(--serif); font-size: 1.3rem; color: var(--dim); margin-bottom: .5rem; }
    .empty-state span { font-size: .75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); opacity: .6; }

    /* ── Toast ─────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      font-size: .8rem; padding: 10px 18px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,.5);
      transform: translateX(130%); transition: transform .25s ease; z-index: 200;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateX(0); }
    .toast-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .header { padding: 0 1rem; }
      .hpill  { display: none; }
      .body   { padding: 1rem 1rem 3rem; }
      .grid   { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════ -->
<header class="header">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-8-15.03-8-15.03 0h15.03zM1.02 17h15v2h-15z"/></svg>
    </div>
    <div>
      <div class="brand-name">Kitchen Display</div>
      <div class="brand-sub">Live Order Board</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <div class="hclock" id="clock">--:--:--</div>
    <div class="hpill">Active <b id="activeCount">0</b></div>
    <div class="hpill">Today <b id="todayCount">0</b></div>
  </div>
</header>

<!-- ══ BODY ════════════════════════════════════════════════════ -->
<div class="body">
  <div class="section-head">
    <div class="section-label">Orders in Preparation</div>
    <div class="section-count" id="sectionCount">Loading…</div>
  </div>
  <div class="grid" id="ordersGrid">
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- ══ TOAST ═══════════════════════════════════════════════════ -->
<div class="toast" id="toast">
  <div class="toast-dot" id="toastDot"></div>
  <span id="toastMsg"></span>
</div>

<!-- ══ SCRIPTS ═════════════════════════════════════════════════ -->
<script>
  /* ── Clock ──────────────────────────────────────────────── */
  function updateClock() {
    var n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' +
      String(n.getMinutes()).padStart(2,'0') + ':' +
      String(n.getSeconds()).padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ── Toast ──────────────────────────────────────────────── */
  var toastTimer;
  function showToast(msg, type) {
    var t   = document.getElementById('toast');
    var dot = document.getElementById('toastDot');
    var colors = { green:'#3ecf8e', blue:'#4d9eff', red:'#f46b6b' };
    dot.style.background = colors[type] || colors.green;
    t.style.borderColor  = (colors[type]||colors.green).replace(')',', .35)').replace('rgb','rgba');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
  }

  /* ── Item tick ──────────────────────────────────────────── */
  function tickItem(row) {
    row.classList.toggle('ticked');
    var card  = row.closest('.card');
    var all   = card.querySelectorAll('.item-row').length;
    var done  = card.querySelectorAll('.item-row.ticked').length;
    var pct   = Math.round((done / all) * 100);
    card.querySelector('.progress-fill').style.width = pct + '%';
    card.querySelector('.progress-pct').textContent  = done + ' / ' + all;
  }

  /* ── Mark as Ready ──────────────────────────────────────── */
  /* Meaning: food is COOKED and waiting on the counter.
     Kitchen's job is done. Counter staff should call the token. */
  function markReady(orderId, btn) {
    fetch('/api/kitchen/ready/' + orderId, { method: 'POST' })
      .then(function(r){ return r.json(); })
      .then(function(data){
        var card = document.getElementById('card-' + orderId);
        card.classList.add('ready-state');
        card.classList.remove('urgent');

        // Update status chip
        var chip = card.querySelector('.status-chip');
        chip.className = 'status-chip ready';
        chip.innerHTML =
          '<svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor">' +
          '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' +
          ' Ready for Pickup';

        // Disable ready button
        btn.disabled = true;

        showToast(data.announce || 'Token ready for pickup', 'green');
      })
      .catch(function(){ showToast('Network error. Please retry.', 'red'); });
  }

  /* ── Mark as Served ─────────────────────────────────────── */
  /* Meaning: counter staff handed the food to the customer.
     Order is 100% complete and removed from the board. */
  function markServed(orderId) {
    fetch('/api/kitchen/served/' + orderId, { method: 'POST' })
      .then(function(r){ return r.json(); })
      .then(function(){
        var card = document.getElementById('card-' + orderId);
        card.style.opacity   = '0';
        card.style.transform = 'scale(.95)';
        setTimeout(function(){
          card.remove();
          refreshCounts();
        }, 400);
        showToast('Order #' + orderId + ' served and completed.', 'blue');
      })
      .catch(function(){ showToast('Network error. Please retry.', 'red'); });
  }

  /* ── Build a single order card ──────────────────────────── */
  function timerClass(orderTime) {
    var mins = (Date.now() - new Date(orderTime).getTime()) / 60000;
    if (mins > 10) return 'urgent';
    if (mins > 5)  return 'warn';
    return 'normal';
  }

  function elapsedLabel(orderTime) {
    var secs = Math.floor((Date.now() - new Date(orderTime).getTime()) / 1000);
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  function buildCard(order) {
    var tc      = timerClass(order.order_time);
    var urgent  = tc === 'urgent' ? ' urgent' : '';
    var token   = order.token_number ? 'T-' + String(order.token_number).padStart(2,'0') : '#' + order.order_id;
    var timeStr = new Date(order.order_time).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    var total   = order.order_lines.length;

    var itemsHtml = order.order_lines.map(function(line){
      return '<div class="item-row" onclick="tickItem(this)">' +
        '<div class="tick-box"><div class="tick-mark"></div></div>' +
        '<div class="item-qty">' + line.quantity + '×</div>' +
        '<div class="item-label">' + line.item_name + '</div>' +
        '</div>';
    }).join('');

    var card = document.createElement('div');
    card.className = 'card' + urgent;
    card.id = 'card-' + order.order_id;
    card.innerHTML =
      '<div class="card-stripe"></div>' +
      '<div class="card-head">' +
        '<div>' +
          '<div class="token-num">' + token + '</div>' +
          '<div class="token-label">Token</div>' +
        '</div>' +
        '<div class="card-meta">' +
          '<div class="order-ref">Order #' + order.order_id + '</div>' +
          '<div class="order-time-val">' + timeStr + '</div>' +
          '<div class="timer-chip ' + tc + '" id="timer-' + order.order_id + '">' +
            '<div class="ti"></div>' +
            '<span class="elapsed">' + elapsedLabel(order.order_time) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="divider"></div>' +
      '<div class="items-list">' + itemsHtml + '</div>' +
      '<div class="progress-wrap">' +
        '<div class="progress-info">' +
          '<span class="progress-text">Items prepared</span>' +
          '<span class="progress-pct">0 / ' + total + '</span>' +
        '</div>' +
        '<div class="progress-bar"><div class="progress-fill"></div></div>' +
      '</div>' +
      '<div class="status-row">' +
        '<div class="status-chip preparing"><div class="sdot"></div>Preparing</div>' +
      '</div>' +
      '<div class="card-foot">' +
        '<button class="btn btn-ready" onclick="markReady(' + order.order_id + ', this)">' +
          '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' +
          'Mark as Ready' +
        '</button>' +
        '<button class="btn btn-served" onclick="markServed(' + order.order_id + ')">' +
          'Served' +
        '</button>' +
      '</div>';
    return card;
  }

  /* ── Refresh counts in header ───────────────────────────── */
  function refreshCounts() {
    var cards = document.querySelectorAll('.card');
    document.getElementById('activeCount').textContent  = cards.length;
    document.getElementById('sectionCount').textContent =
      cards.length + ' order' + (cards.length !== 1 ? 's' : '');
  }

  /* ── Poll server every 8 seconds ───────────────────────── */
  var knownIds = new Set();

  function fetchOrders() {
    fetch('/api/kitchen/orders')
      .then(function(r){ return r.json(); })
      .then(function(data){
        var orders  = data.orders || [];
        var grid    = document.getElementById('ordersGrid');
        var newIds  = new Set(orders.map(function(o){ return o.order_id; }));

        // Add new cards
        orders.forEach(function(order){
          if (!knownIds.has(order.order_id)) {
            var card = buildCard(order);
            grid.appendChild(card);
            knownIds.add(order.order_id);
          }
        });

        // Remove cards no longer on server (served elsewhere)
        knownIds.forEach(function(id){
          if (!newIds.has(id)) {
            var el = document.getElementById('card-' + id);
            if (el) el.remove();
            knownIds.delete(id);
          }
        });

        // Empty state
        if (orders.length === 0) {
          if (!document.getElementById('emptyState')) {
            var empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.id = 'emptyState';
            empty.innerHTML =
              '<svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>' +
              '<p>All Clear</p><span>No active orders right now</span>';
            grid.appendChild(empty);
          }
        } else {
          var es = document.getElementById('emptyState');
          if (es) es.remove();
        }

        // Update today count from orders
        document.getElementById('todayCount').textContent = orders.length;
        refreshCounts();
      })
      .catch(function(err){ console.error('Kitchen fetch error:', err); });
  }

  /* ── Tick elapsed timers every second ──────────────────── */
  function updateTimers() {
    document.querySelectorAll('.card').forEach(function(card){
      var orderId  = card.id.replace('card-','');
      var chip     = document.getElementById('timer-' + orderId);
      if (!chip) return;
      var elapsed  = chip.querySelector('.elapsed');
      if (!elapsed) return;

      // Re-read order time from data attribute (set on first build)
      var ot = card.dataset.orderTime;
      if (!ot) return;
      elapsed.textContent = elapsedLabel(ot);

      // Update urgency class
      var tc = timerClass(ot);
      chip.className = 'timer-chip ' + tc;
      if (tc === 'urgent') { card.classList.add('urgent'); card.querySelector('.card-stripe').style.background='var(--red)'; }
    });
  }

  /* ── Init ───────────────────────────────────────────────── */
  fetchOrders();
  setInterval(fetchOrders,  8000);
  setInterval(updateTimers, 1000);
</script>
</body>
</html>
